<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>goose-providers OpenAI wasm chat</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, sans-serif;
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      label { display: block; margin: 1rem 0 0.25rem; font-weight: 600; }
      input, textarea, select, button {
        box-sizing: border-box;
        width: 100%;
        font: inherit;
        padding: 0.6rem;
      }
      button { cursor: pointer; }
      button:disabled { cursor: wait; opacity: 0.65; }
      .settings {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 1rem;
      }
      .settings .wide { grid-column: 1 / -1; }
      .hint { color: #666; font-size: 0.9rem; margin-top: 0.35rem; }
      #chat {
        border: 1px solid #ccc;
        border-radius: 0.75rem;
        min-height: 22rem;
        max-height: 32rem;
        overflow-y: auto;
        padding: 1rem;
        margin: 1.5rem 0 1rem;
        background: rgba(127, 127, 127, 0.06);
      }
      .message {
        margin: 0.75rem 0;
        display: flex;
      }
      .bubble {
        max-width: 78%;
        padding: 0.75rem 0.9rem;
        border-radius: 0.9rem;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .user { justify-content: flex-end; }
      .user .bubble { background: #1f6feb; color: white; }
      .assistant { justify-content: flex-start; }
      .assistant .bubble { background: rgba(127, 127, 127, 0.18); }
      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.75rem;
        align-items: end;
      }
      #prompt { min-height: 4.5rem; resize: vertical; }
      #send { width: 8rem; }
      #status { min-height: 1.5rem; color: #666; margin-top: 0.5rem; }
      @media (max-width: 700px) {
        .settings { grid-template-columns: 1fr; }
        .settings .wide { grid-column: auto; }
        .composer { grid-template-columns: 1fr; }
        #send { width: 100%; }
        .bubble { max-width: 92%; }
      }
    </style>
  </head>
  <body>
    <h1>goose-providers OpenAI wasm chat</h1>

    <section class="settings">
      <div class="wide">
        <label for="api-key">OpenAI API key</label>
        <input id="api-key" type="password" autocomplete="off" placeholder="sk-..." />
      </div>

      <div>
        <label for="base-url">Base URL</label>
        <input id="base-url" value="https://api.openai.com" />
      </div>

      <div>
        <label for="model">Model</label>
        <select id="model">
          <option value="gpt-5.5">gpt-5.5</option>
          <option value="gpt-4o-mini" selected>gpt-4o-mini</option>
        </select>
      </div>
    </section>

    <main id="chat" aria-live="polite"></main>

    <form id="composer" class="composer">
      <textarea id="prompt" placeholder="Ask something...">What is the capital of France?</textarea>
      <button id="send" type="submit">Send</button>
    </form>
    <div id="status"></div>

    <script type="module">
      import init, { stream_openai_chat } from "./pkg/wasm_openai_provider_poc.js";

      const chat = document.getElementById("chat");
      const composer = document.getElementById("composer");
      const send = document.getElementById("send");
      const promptInput = document.getElementById("prompt");
      const status = document.getElementById("status");
      const apiKeyInput = document.getElementById("api-key");
      const baseUrlInput = document.getElementById("base-url");
      const modelSelect = document.getElementById("model");
      const history = [];

      await init();
      renderEmptyState();

      composer.addEventListener("submit", async (event) => {
        event.preventDefault();

        const prompt = promptInput.value.trim();
        if (!prompt) return;

        const apiKey = apiKeyInput.value.trim();
        const baseUrl = baseUrlInput.value.trim();
        const model = modelSelect.value;

        if (!apiKey) {
          status.textContent = "Enter an OpenAI API key first.";
          return;
        }

        status.textContent = "Streaming response...";
        send.disabled = true;
        promptInput.disabled = true;
        promptInput.value = "";

        history.push({ role: "user", content: prompt });
        appendMessage("user", prompt);

        const assistant = appendMessage("assistant", "");
        let assistantText = "";

        try {
          await stream_openai_chat(apiKey, baseUrl, model, history, (chunk) => {
            assistantText += chunk;
            assistant.textContent = assistantText;
            scrollToBottom();
          });

          history.push({ role: "assistant", content: assistantText });
          status.textContent = "";
        } catch (error) {
          const message = error?.stack || String(error);
          assistant.textContent = `Error: ${message}`;
          status.textContent = "Request failed.";
        } finally {
          send.disabled = false;
          promptInput.disabled = false;
          promptInput.focus();
        }
      });

      promptInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) {
          composer.requestSubmit();
        }
      });

      function appendMessage(role, content) {
        removeEmptyState();

        const row = document.createElement("div");
        row.className = `message ${role}`;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = content;

        row.appendChild(bubble);
        chat.appendChild(row);
        scrollToBottom();
        return bubble;
      }

      function scrollToBottom() {
        chat.scrollTop = chat.scrollHeight;
      }

      function renderEmptyState() {
        const empty = document.createElement("div");
        empty.id = "empty-state";
        empty.className = "hint";
        empty.textContent = "Send a message to start a chat.";
        chat.appendChild(empty);
      }

      function removeEmptyState() {
        document.getElementById("empty-state")?.remove();
      }
    </script>
  </body>
</html>
