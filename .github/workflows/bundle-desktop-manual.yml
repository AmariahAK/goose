name: Manual Desktop Bundle (Unsigned)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name to bundle app from'
        required: true
        type: string
      backend:
        description: 'Desktop backend to bundle'
        required: false
        type: choice
        default: goosed
        options:
          - goosed
          - acp

jobs:
  bundle-desktop-unsigned:
    uses: ./.github/workflows/bundle-desktop.yml
    permissions:
      id-token: write
      contents: read
    with:
      signing: false
      ref: ${{ inputs.branch }}
      backend: ${{ inputs.backend }}

  bundle-desktop-intel-unsigned:
    uses: ./.github/workflows/bundle-desktop-intel.yml
    permissions:
      id-token: write
      contents: read
    with:
      signing: false
      ref: ${{ inputs.branch }}
      backend: ${{ inputs.backend }}
